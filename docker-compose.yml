services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_estacionamiento_utp2}
    ports:
      - "${HOST_PORT_DB:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parking_network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      DB_NAME: ${MYSQL_DATABASE:-db_estacionamiento_utp2}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - parking_network

  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "${HOST_PORT_FRONTEND:-8080}:80"
    volumes:
      - ./Fronted:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./modelos de carros:/usr/share/nginx/html/modelos-de-carros:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - parking_network

networks:
  parking_network:
    name: ${COMPOSE_PROJECT_NAME:-estacionamiento}_network
    driver: bridge

volumes:
  mysql_data:
