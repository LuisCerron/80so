services:
  db:
    image: mysql:8.0
    container_name: parking_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_estacionamiento_utp2
    ports:
      - "${HOST_PORT_DB:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: parking_backend
    restart: unless-stopped
    ports:
      - "${HOST_PORT_BACKEND:-3000}:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: db_estacionamiento_utp2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - parking_network

  frontend:
    image: nginx:alpine
    container_name: parking_frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT_FRONTEND:-8080}:80"
    volumes:
      - ./Fronted:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - parking_network

networks:
  parking_network:
    driver: bridge

volumes:
  mysql_data:
